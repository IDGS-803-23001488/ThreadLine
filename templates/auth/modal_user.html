{% extends "auth/modal_base.html" %}

{% block container %}
    <div class="flex justify-center items-start  px-4">
        <div class="max-w-md w-full bg-white rounded-xl shadow-md border border-gray-200 overflow-hidden p-6">

            <div class="text-center mb-6">
                <p class="text-gray-700 text-base">
                    Esta cuenta está asociada a <span class="font-semibold text-emerald-600">2 usuarios</span>,
                    ¿cómo desea acceder?
                </p>
            </div>

            <form method="POST" class="space-y-4">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

                <button type="submit" name="tipo" value="cliente"
                    class="w-full text-white font-medium flex items-center justify-center py-2.5 px-4 rounded-lg transition-colors hover:opacity-90"
                    style="background-color:#0d7879;">
                    <svg class="w-6 h-6 mr-2" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 20H50L54 56H10L14 20Z" />
                        <path d="M24 26V14C24 9.58 27.58 6 32 6C36.42 6 40 9.58 40 14V26" />
                        <line x1="14" y1="32" x2="50" y2="32" />
                    </svg>
                    Acceder como cliente
                </button>

                <button type="submit" name="tipo" value="empleado"
                    class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium flex items-center justify-center py-2.5 px-4 rounded-lg transition-colors">
                    <svg class="w-6 h-6 mr-2" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="12" y="10" width="40" height="48" rx="3" />
                        <path d="M24 10V4C24 4 32 2 40 4V10" />
                        <circle cx="32" cy="28" r="7" />
                        <line x1="22" y1="42" x2="42" y2="42" />
                        <line x1="22" y1="50" x2="35" y2="50" />
                    </svg>
                    Acceder como empleado
                </button>
            </form>

        </div>
    </div>
{%endblock%}
