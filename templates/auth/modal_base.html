<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThreadLine · Acceso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" />

    <style>
        /* Fondo fijo con el estilo de base.html */
        .base-header {
            background: #0c7779;
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: -1;
        }

        /* Patrón de líneas diagonales */
        .base-header::before {
            content: '';
            position: absolute; inset: 0;
            background-image:
                repeating-linear-gradient(45deg,  transparent, transparent 22px, rgba(255,255,255,.04) 22px, rgba(255,255,255,.04) 23px),
                repeating-linear-gradient(-45deg, transparent, transparent 22px, rgba(255,255,255,.03) 22px, rgba(255,255,255,.03) 23px);
            pointer-events: none;
        }

        /* Círculo grande inferior derecho */
        .base-header::after {
            content: '';
            position: absolute;
            width: 420px; height: 420px; border-radius: 50%;
            bottom: -160px; right: -120px;
            background: rgba(0,0,0,.07);
            pointer-events: none;
        }

        /* Blob superior izquierdo */
        .blob {
            position: absolute;
            width: 280px; height: 280px; border-radius: 50%;
            top: -100px; left: -80px;
            background: rgba(255,255,255,.05);
            pointer-events: none;
        }

        /* Animaciones de flotación (drift1 a drift6) */
        @keyframes drift1 { 0%,100%{transform:translate(0,0) rotate(0deg)} 33%{transform:translate(16px,-20px) rotate(5deg)} 66%{transform:translate(-10px,13px) rotate(-4deg)} }
        @keyframes drift2 { 0%,100%{transform:translate(0,0) rotate(0deg)} 40%{transform:translate(-18px,15px) rotate(-6deg)} 70%{transform:translate(12px,-9px) rotate(4deg)} }
        @keyframes drift3 { 0%,100%{transform:translate(0,0) rotate(0deg)} 30%{transform:translate(9px,18px) rotate(3deg)} 60%{transform:translate(-14px,-11px) rotate(-5deg)} }
        @keyframes drift4 { 0%,100%{transform:translate(0,0) rotate(0deg)} 50%{transform:translate(-7px,-16px) rotate(7deg)} }
        @keyframes drift5 { 0%,100%{transform:translate(0,0) rotate(0deg)} 45%{transform:translate(20px,9px) rotate(-4deg)} 80%{transform:translate(-9px,16px) rotate(3deg)} }
        @keyframes drift6 { 0%,100%{transform:translate(0,0) rotate(0deg)} 35%{transform:translate(-13px,18px) rotate(-3deg)} 70%{transform:translate(16px,-7px) rotate(6deg)} }

        .cloud-icon {
            position: absolute;
            color: rgba(255,255,255,.11);
            z-index: 1;
            pointer-events: none;
        }

        /* Logo y nombre en la parte superior */
        .header-top-content {
            position: absolute;
            top: 40px;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .logo-circle {
            width: 80px; height: 80px; border-radius: 50%;
            background: rgba(255,255,255,.12);
            border: 2px solid rgba(255,255,255,.25);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 10px;
        }

        .brand-name {
            font-size: 1.5rem; font-weight: 700;
            color: #fff; letter-spacing: -.02em;
        }
    </style>
</head>
<body class="m-0 p-0 overflow-hidden">

    <!-- Fondo con todos los iconos animados -->
    <div class="base-header">
        <div class="blob"></div>

        <!-- Camiseta -->
        <svg class="cloud-icon" style="width:58px;top:7%;left:10%;animation:drift1 9s ease-in-out infinite;" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 8 C22 8 18 10 10 14 L16 24 L22 20 L22 54 L42 54 L42 20 L48 24 L54 14 C46 10 42 8 42 8 C42 8 40 13 32 13 C24 13 22 8 22 8 Z"/>
        </svg>

        <!-- Chamarra -->
        <svg class="cloud-icon" style="width:54px;top:16%;left:68%;animation:drift2 11s ease-in-out .5s infinite;" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 8 L10 16 L8 30 L18 30 L18 56 L46 56 L46 30 L56 30 L54 16 L42 8"/>
            <path d="M22 8 L22 14 Q26 18 32 18 Q38 18 42 14 L42 8"/>
            <line x1="32" y1="18" x2="32" y2="56"/>
            <rect x="19" y="36" width="8" height="6" rx="1"/>
            <rect x="37" y="36" width="8" height="6" rx="1"/>
        </svg>

        <!-- Suéter -->
        <svg class="cloud-icon" style="width:52px;top:65%;left:6%;animation:drift3 8s ease-in-out 1s infinite;" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10 C21 10 17 12 9 16 L15 27 L21 22 L21 54 L43 54 L43 22 L49 27 L55 16 C47 12 43 10 43 10"/>
            <path d="M21 10 Q32 16 43 10"/>
            <path d="M21 10 Q32 6 43 10"/>
            <line x1="21" y1="22" x2="21" y2="36"/>
            <line x1="43" y1="22" x2="43" y2="36"/>
            <line x1="21" y1="52" x2="43" y2="52"/>
        </svg>

        <!-- Pantalón -->
        <svg class="cloud-icon" style="width:46px;top:72%;left:62%;animation:drift4 10s ease-in-out .3s infinite;" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 10 L12 58 L26 58 L32 32 L38 58 L52 58 L48 10 Z"/>
            <line x1="16" y1="10" x2="48" y2="10"/>
            <line x1="16" y1="16" x2="48" y2="16"/>
            <path d="M32 16 L32 32"/>
        </svg>

        <!-- Polo -->
        <svg class="cloud-icon" style="width:48px;top:38%;left:5%;animation:drift5 12s ease-in-out .8s infinite;" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 8 C22 8 18 11 10 15 L16 25 L22 21 L22 54 L42 54 L42 21 L48 25 L54 15 C46 11 42 8 42 8"/>
            <path d="M22 8 L28 18 L32 14 L36 18 L42 8"/>
            <line x1="32" y1="18" x2="32" y2="30"/>
            <circle cx="32" cy="22" r="1.2" fill="currentColor"/>
            <circle cx="32" cy="27" r="1.2" fill="currentColor"/>
        </svg>

        <!-- Hoodie -->
        <svg class="cloud-icon" style="width:56px;top:28%;left:76%;animation:drift6 13s ease-in-out 1.2s infinite;" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 10 C22 10 17 12 9 17 L15 27 L21 22 L21 54 L43 54 L43 22 L49 27 L55 17 C47 12 42 10 42 10"/>
            <path d="M22 10 Q22 4 32 4 Q42 4 42 10"/>
            <path d="M22 10 Q26 14 32 14 Q38 14 42 10"/>
            <path d="M24 40 Q24 46 32 46 Q40 46 40 40"/>
            <line x1="29" y1="14" x2="27" y2="22"/>
            <line x1="35" y1="14" x2="37" y2="22"/>
        </svg>

        <!-- Calcetín -->
        <svg class="cloud-icon" style="width:36px;top:52%;left:74%;animation:drift1 14s ease-in-out 2s infinite;" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 8 L22 38 Q22 46 28 50 Q34 54 40 50 Q46 46 44 40 L36 32 L36 8 Z"/>
            <line x1="22" y1="14" x2="36" y2="14"/>
            <line x1="22" y1="18" x2="36" y2="18"/>
        </svg>

        <!-- Vestido -->
        <svg class="cloud-icon" style="width:44px;top:82%;left:28%;animation:drift2 10s ease-in-out 1.8s infinite;" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M24 8 L20 18 L26 18 L20 56 L44 56 L38 18 L44 18 L40 8 Z"/>
            <path d="M24 8 Q32 13 40 8"/>
            <line x1="22" y1="30" x2="42" y2="30"/>
            <line x1="27" y1="8" x2="26" y2="18"/>
            <line x1="37" y1="8" x2="38" y2="18"/>
        </svg>

        <!-- Gorro -->
        <svg class="cloud-icon" style="width:38px;top:4%;left:48%;animation:drift3 11s ease-in-out .6s infinite;" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 36 Q16 16 32 12 Q48 16 48 36 Z"/>
            <circle cx="32" cy="10" r="4"/>
            <rect x="14" y="36" width="36" height="8" rx="4"/>
            <line x1="32" y1="12" x2="32" y2="36"/>
            <path d="M22 18 Q26 24 22 30"/>
            <path d="M42 18 Q38 24 42 30"/>
        </svg>
    </div>

    <!-- Logo y nombre en la parte superior (flotante) -->
    <div class="header-top-content">
        <div class="logo-circle">
            <img src="{{ url_for('static', filename='imagenes/logo.png') }}" alt="Logo" width="45" style="filter:brightness(0) invert(1);">
        </div>
        <div class="brand-name">ThreadLine</div>
    </div>

    <!-- Contenedor principal: centra la tarjeta del modal -->
    <main class="w-screen h-screen flex items-center justify-center px-4">
        <div class="z-50 w-full max-w-md">
            {% block container %}
            <!-- Aquí se inyectará el contenido del modal (los botones) -->
            <div class="bg-white rounded-xl shadow-md border border-gray-200 p-6">
                <div class="text-center mb-6">
                    <p class="text-gray-700 text-base">
                        Esta cuenta está asociada a <span class="font-semibold text-emerald-600">2 usuarios</span>,
                        ¿cómo desea acceder?
                    </p>
                </div>
                <form method="POST" class="space-y-4">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    <button type="submit" name="tipo" value="cliente"
                        class="w-full text-white font-medium py-2.5 px-4 rounded-lg"
                        style="background-color:#0d7879;">
                        Acceder como cliente
                    </button>
                    <button type="submit" name="tipo" value="empleado"
                        class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium py-2.5 px-4 rounded-lg">
                        Acceder como empleado
                    </button>
                </form>
            </div>
            {% endblock %}
        </div>
    </main>

</body>
</html>
