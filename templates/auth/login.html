{% extends "auth/base.html" %}

{% block container %}
<p class="card-title">Iniciar Sesión</p>

{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
    {% endif %}
{% endwith %}

<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="field-wrap">
        <span class="field-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
        </span>
        <input type="email" name="correo" required placeholder="Correo electrónico" class="field">
    </div>

    <div class="field-wrap">
        <span class="field-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
        </span>
        <input type="password" name="contrasenia" id="pw" required
                placeholder="Contraseña" class="field" style="padding-right:2.4rem;">
        <button type="button" class="eye-btn" onclick="togglePw()">
            <svg id="eye" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
        </button>
    </div>

    <button type="submit" class="btn">Entrar</button>
</form>

<p style="text-align:center;margin-top:1.25rem;font-size:.8rem;color:#9ca3af;">
    ¿No tienes cuenta?
    <a href="{{ url_for('auth.registrar') }}" class="link-small">Regístrate aquí</a>
</p>
{% endblock %}
