<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dist/output.css') }}">
</head>

<body class="h-full bg-gray-100 dark:bg-gray-900 flex items-center justify-center antialiased">

    <div class="w-full max-w-md px-6">

        <!-- Logo / Título -->
        <div class="flex flex-col items-center mb-8">
            <div class="w-16 h-16 bg-gradient-to-br from-red-500 to-red-600 
                        dark:from-red-600 dark:to-red-700 
                        text-white flex items-center justify-center 
                        rounded-2xl text-2xl font-bold shadow-lg 
                        dark:shadow-red-900/30">
                T
            </div>
            <h1 class="mt-4 text-2xl font-semibold text-gray-800 dark:text-white">
                ThreadLine
            </h1>
            <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">
                Panel de Administración
            </p>
        </div>

        <!-- Card -->
        <div class="bg-white dark:bg-gray-800 
                    shadow-xl dark:shadow-gray-950/40 
                    rounded-2xl p-8 border border-gray-200 
                    dark:border-gray-700">

            <h2 class="text-xl font-semibold text-gray-800 dark:text-white mb-6 text-center">
                Iniciar Sesión
            </h2>

            <!-- Flash messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="space-y-3 mb-4">
                        {% for category, message in messages %}
                            <div class="p-3 text-sm rounded-xl border-l-4
                                {% if category == 'error' %}
                                    bg-red-50 dark:bg-red-900/20 text-red-800 dark:text-red-300 border-red-500
                                {% elif category == 'success' %}
                                    bg-green-50 dark:bg-green-900/20 text-green-800 dark:text-green-300 border-green-500
                                {% else %}
                                    bg-blue-50 dark:bg-blue-900/20 text-blue-800 dark:text-blue-300 border-blue-500
                                {% endif %}">
                                {{ message }}
                            </div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <!-- Formulario -->
            <form method="POST" class="space-y-5">

                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <!-- Usuario -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
                        Usuario
                    </label>
                    <input type="text" 
                           name="usuario" 
                           required
                           class="w-full px-4 py-2 rounded-xl 
                                  bg-gray-50 dark:bg-gray-700 
                                  border border-gray-300 dark:border-gray-600
                                  text-gray-800 dark:text-white
                                  focus:ring-2 focus:ring-blue-500 focus:outline-none
                                  transition-all duration-200">
                </div>

                <!-- Contraseña -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
                        Contraseña
                    </label>
                    <input type="password" 
                           name="contrasenia" 
                           required
                           class="w-full px-4 py-2 rounded-xl 
                                  bg-gray-50 dark:bg-gray-700 
                                  border border-gray-300 dark:border-gray-600
                                  text-gray-800 dark:text-white
                                  focus:ring-2 focus:ring-blue-500 focus:outline-none
                                  transition-all duration-200">
                </div>

                <!-- Botón -->
                <button type="submit"
                        class="w-full py-2 rounded-xl
                               bg-blue-600 hover:bg-blue-700
                               text-white font-medium
                               transition-all duration-200
                               shadow-md hover:shadow-lg">
                    Ingresar
                </button>

            </form>

        </div>

        <!-- Footer -->
        <div class="text-center mt-6 text-xs text-gray-400 dark:text-gray-500">
            Versión 1.0.0
        </div>

    </div>

</body>
</html>
