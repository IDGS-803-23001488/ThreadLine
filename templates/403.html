{% extends "layout.html" %}

{% block container %}
<div class="flex flex-col items-center justify-center text-center py-20">

    <h1 class="text-6xl font-bold text-red-500">403</h1>

    <h2 class="mt-4 text-2xl font-semibold text-gray-800 dark:text-gray-200">
        Acceso denegado
    </h2>

    <!-- <p class="mt-2 text-gray-500">
        Permiso requerido: {{ error }}
    </p> -->

    <p class="mt-2 text-gray-500 dark:text-gray-400 max-w-md">
        No tienes permisos para acceder a esta sección.
        Si crees que es un error, contacta al administrador.
    </p>

    <div class="mt-6 flex gap-4">
        <a href="{{ url_for('main.index') }}"
           class="px-4 py-2 bg-brand text-white rounded-lg shadow hover:bg-brand-strong">
            Ir al inicio
        </a>

        <a href="{{ url_for('auth.logout') }}"
           class="px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600">
            Cerrar sesión
        </a>
    </div>

</div>
{% endblock %}
