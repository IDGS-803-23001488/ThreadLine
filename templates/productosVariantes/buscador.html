{% extends "layout.html" %}

{% block container %}

<div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-6">

    <h2 class="text-2xl font-bold text-gray-800 dark:text-white mb-4">
        🔎 Buscador de Productos
    </h2>

    <!-- Buscador -->
    <form method="GET" class="mb-6 flex gap-2">
        <input 
            type="text" 
            name="search" 
            value="{{ search }}"
            placeholder="Buscar producto..."
            class="w-full px-4 py-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600"
        >

        <button 
            type="submit"
            class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg"
        >
            Buscar
        </button>
    </form>

    <!-- Tabla -->
    <div class="overflow-x-auto">
        <table class="min-w-full text-sm text-left text-gray-500 dark:text-gray-300">
            <thead class="text-xs uppercase bg-gray-100 dark:bg-gray-700">
                <tr>
                    {% for h in headers %}
                        <th class="px-4 py-2">{{ h }}</th>
                    {% endfor %}
                    <th class="px-4 py-2">Acción</th>
                </tr>
            </thead>
            <tbody>
                {% for row in rows %}
                    <tr class="border-b dark:border-gray-700">
                        {% for col in row %}
                            <td class="px-4 py-2">{{ col[1] }}</td>
                        {% endfor %}

                        <!-- 👇 BOTÓN CLAVE -->
                        <td class="px-4 py-2">
                            <a href="{{ url_for('productosVariantes.seleccionar',
                                id=row[0][1],
                                return_url=return_url) }}"
                            class="px-3 py-1 bg-green-600 hover:bg-green-700 text-white rounded-lg">
                                Seleccionar
                            </a>
                        </td>
                    </tr>
                {% else %}
                    <tr>
                        <td colspan="6" class="text-center py-4">
                            No hay resultados
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</div>

{% endblock %}
