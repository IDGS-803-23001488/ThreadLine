<!-- templates/macros/dialogs.html -->
{% macro confirm_delete(id, url, titulo="Confirmar eliminación", mensaje="¿Seguro que deseas eliminar este registro?") %}

    <button
        onclick="document.getElementById('confirm-{{ id }}').showModal()"
        class="inline-flex items-center gap-2 text-white bg-red-600 hover:bg-red-700
            dark:bg-red-500 dark:hover:bg-red-600
            focus:ring-4 focus:ring-red-300 dark:focus:ring-red-800
            border border-transparent shadow-sm font-medium
            rounded-lg text-sm px-4 py-2 transition-all duration-200">

        {{ svg_eliminar() }}

    </button>

    <!-- MODAL CENTRADO -->
    <dialog
        id="confirm-{{ id }}"
        class="p-0 rounded-2xl shadow-2xl w-full max-w-md
            fixed inset-0 m-auto h-fit
            backdrop:bg-black/60 backdrop:backdrop-blur-sm
            open:animate-in open:fade-in open:zoom-in duration-200">

        <div class="bg-white dark:bg-gray-900 rounded-2xl overflow-hidden">

            <!-- HEADER -->
            <div class="flex gap-4 px-6 pt-6 pb-4">

                <div class="flex items-center justify-center w-12 h-12
                            rounded-full bg-red-100 dark:bg-red-900/40">

                    <svg class="w-6 h-6 text-red-600 dark:text-red-400"
                        fill="none"
                        stroke="currentColor"
                        viewBox="0 0 24 24">

                        <path stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M12 9v2m0 4h.01M3.34 16L10.27 4c.77-1.333 2.694-1.333 3.464 0l6.93 12c.77 1.333-.192 3-1.732 3H5.072c-1.54 0-2.502-1.667-1.732-3z"/>
                    </svg>

                </div>

                <div class="flex-1">
                    <h3 class="text-lg font-semibold text-gray-900 dark:text-white">
                        {{ titulo }}
                    </h3>

                    <p class="mt-1 text-sm text-gray-600 dark:text-gray-300">
                        {{ mensaje }}
                    </p>
                </div>

            </div>

            <!-- DIVIDER -->
            <div class="border-t border-gray-200 dark:border-gray-700"></div>

            <!-- FOOTER -->
            <div class="flex justify-end gap-3 px-6 py-4
                        bg-gray-50 dark:bg-gray-800">

                <!-- CANCELAR -->
                <form method="dialog">

                    <button
                        class="px-4 py-2 text-sm font-medium
                            text-gray-700 dark:text-gray-200
                            bg-gray-200 dark:bg-gray-700
                            hover:bg-gray-300 dark:hover:bg-gray-600
                            rounded-lg transition
                            focus:ring-4 focus:ring-gray-300 dark:focus:ring-gray-600">

                        Cancelar

                    </button>

                </form>

                <!-- ELIMINAR -->
                <a
                    href="{{ url }}"
                    class="px-4 py-2 text-sm font-medium text-white
                        bg-red-600 hover:bg-red-700
                        dark:bg-red-500 dark:hover:bg-red-600
                        rounded-lg transition
                        focus:ring-4 focus:ring-red-300 dark:focus:ring-red-800">

                    Eliminar

                </a>

            </div>

        </div>

    </dialog>

{% endmacro %}

{% macro svg_eliminar() %}
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
        <path d="M3.375 3C2.339 3 1.5 3.84 1.5 4.875v.75c0 1.036.84 1.875 1.875 1.875h17.25c1.035 0 1.875-.84 1.875-1.875v-.75C22.5 3.839 21.66 3 20.625 3H3.375Z"/>
        <path fill-rule="evenodd" d="m3.087 9 .54 9.176A3 3 0 0 0 6.62 21h10.757a3 3 0 0 0 2.995-2.824L20.913 9H3.087Z" clip-rule="evenodd"/>
    </svg>
{% endmacro %}

    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
        <path fill-rule="evenodd" d="M12 6.75a5.25 5.25 0 0 1 6.775-5.025.75.75 0 0 1 .313 1.248l-3.32 3.319c.063.475.276.934.641 1.299.365.365.824.578 1.3.64l3.318-3.319a.75.75 0 0 1 1.248.313 5.25 5.25 0 0 1-5.472 6.756c-1.018-.086-1.87.1-2.309.634L7.344 21.3A3.298 3.298 0 1 1 2.7 16.657l8.684-7.151c.533-.44.72-1.291.634-2.309A5.342 5.342 0 0 1 12 6.75Z" clip-rule="evenodd"/>
        <path d="m10.076 8.64-2.201-2.2V4.874a.75.75 0 0 0-.364-.643l-3.75-2.25a.75.75 0 0 0-.916.113l-.75.75a.75.75 0 0 0-.113.916l2.25 3.75a.75.75 0 0 0 .643.364h1.564l2.062 2.062 1.575-1.297Z"/>
        <path fill-rule="evenodd" d="m12.556 17.329 4.183 4.182a3.375 3.375 0 0 0 4.773-4.773l-3.306-3.305a6.803 6.803 0 0 1-1.53.043c-.394-.034-.682-.006-.867.042a.589.589 0 0 0-.167.063l-3.086 3.748Z" clip-rule="evenodd"/>
    </svg>
{% endmacro %}
