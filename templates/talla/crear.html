<!-- templates/talla/crear.html -->
{% extends "layout.html" %}
{% from "macros/forms.html" import render_input, form_buttons %}

{% block container %}

<div class="bg-white dark:bg-gray-800 p-6 rounded-2xl shadow-lg max-w-lg mx-auto">

<form method="POST">

    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    {{ render_input(form.nombre) }}
    {{ render_input(form.orden) }}
        
    {{ form_buttons(url_for('talla.lista')) }}

</form>

</div>

{% endblock %}
